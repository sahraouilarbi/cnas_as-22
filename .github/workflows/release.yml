name: Build and Release

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement lorsqu'un tag commençant par "v" (ex: v1.0.0) est poussé

jobs:
  release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest] # Compile sur un serveur Windows et un serveur Mac

    permissions:
      contents: write # Nécessaire pour créer la release sur GitHub

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix client
          npm install --prefix server

      - name: Build frontend
        run: npm run build --prefix client

      - name: Build and Publish Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Jeton fourni automatiquement par GitHub
        run: npx electron-builder --publish always
